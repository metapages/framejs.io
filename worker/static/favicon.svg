<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img"
  aria-label="framejs.io">
  <style>
  :root {
    --bg: #fbfaf7;
    --accent: #1f2edb;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0e1117;
      --accent: #6e82ff;
    }
  }
  </style>
  <!-- Mirrors the framejs.app BrandHome glyph: an accent-bordered rounded
       square. The center accent square is intentionally omitted. -->
  <rect width="32" height="32" rx="6" fill="var(--bg)" />
  <rect x="6.4" y="6.4" width="19.2" height="19.2" rx="3.6"
    fill="none" stroke="var(--accent)" stroke-width="2.2" />
</svg>
