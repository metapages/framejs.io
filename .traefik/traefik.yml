global:
  sendAnonymousUsage: false

api:
  dashboard: true
  insecure: true

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    watch: true
    exposedByDefault: false
    # Docker provider watches ALL containers on the socket, not just this
    # compose project. Scope it so it ignores unrelated containers/labels
    # (e.g. another project's traefik-labeled containers referencing
    # entrypoints that don't exist here).
    constraints: "Label(`com.docker.compose.project`, `metaframe-js`)"

  file:
    filename: /etc/traefik/config.yml
    watch: true

log:
  level: INFO
  format: common

entryPoints:
  http:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: https
          scheme: https
  https:
    address: ":443"
