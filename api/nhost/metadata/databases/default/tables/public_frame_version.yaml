table:
  name: frame_version
  schema: public
object_relationships:
  - name: frames
    using:
      foreign_key_constraint_on: frame
insert_permissions:
  - role: user
    permission:
      check:
        frames:
          _or:
            - user:
                _eq: X-Hasura-User-Id
            - _and:
                - user:
                    _is_null: true
      columns:
        - created_at
        - file
        - frame
        - id
        - og
        - sha256
        - url
    comment: ""
select_permissions:
  - role: public
    permission:
      columns:
        - created_at
        - file
        - frame
        - id
        - og
        - sha256
        - url
      filter:
        frames:
          _and:
            - public:
                _eq: true
            - deleted:
                _eq: false
    comment: ""
  - role: user
    permission:
      columns:
        - created_at
        - file
        - frame
        - id
        - og
        - sha256
        - url
      filter:
        frames:
          _or:
            - public:
                _eq: true
            - user:
                _eq: X-Hasura-User-Id
    comment: ""
update_permissions:
  - role: user
    permission:
      columns:
        - created_at
      filter:
        frames:
          user:
            _eq: X-Hasura-User-Id
      check: null
    comment: ""
